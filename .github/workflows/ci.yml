name: FastRG Controller CI
on:
  push: 
    branches: 
      - master
      - ci-dev
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: Setup build environment
      uses: ./.github/actions/setup-build-env
    - name: Build
      run: make build
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: fastrg
          POSTGRES_PASSWORD: fastrg
          POSTGRES_DB: fastrg
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      etcd:
        # No health check: etcd images since v3.5.5 are distroless (no /bin/sh),
        # and docker --health-cmd is always run via `sh -c`, so any health
        # command reports unhealthy regardless of server state. The container
        # is up well before the test steps reach the integration tests.
        image: quay.io/coreos/etcd:v3.5.16
        env:
          ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
          ETCD_ADVERTISE_CLIENT_URLS: http://0.0.0.0:2379
        ports:
          - 2379:2379
    steps:
    - uses: actions/checkout@v7
    - name: Setup build environment
      uses: ./.github/actions/setup-build-env
    # go test needs the gitignored generated code (docs/ from swag, the proto
    # packages); reuse the same generation path the build job exercises.
    - name: Generate code (protobuf + swagger)
      run: make build-backend
    - name: Run tests (unit; integration tests self-skip without TEST_* env)
      run: |
        make test-go
    # Integration tests against the etcd + PostgreSQL service containers above.
    # Kafka e2e (internal/kafka/*_e2e_test.go) needs a broker and runs locally
    # against the kind stack; see Readme.md Testing.
    - name: Run integration tests (etcd + PostgreSQL)
      env:
        TEST_DATABASE_URL: postgres://fastrg:fastrg@localhost:5432/fastrg?sslmode=disable
        TEST_ETCD_ENDPOINTS: localhost:2379
      run: |
        go test -count=1 -cover ./internal/db/ ./internal/server/ ./internal/projection/
  docker-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: Build Docker image
      run: |
        make docker-build
    - name: Save Docker image
      run: |
        docker save fastrg-controller:latest | gzip > fastrg-controller.tar.gz
    - name: Upload Docker image artifact
      uses: actions/upload-artifact@v7
      with:
        name: docker-image
        path: fastrg-controller.tar.gz
        retention-days: 1
  helm-lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - run: sudo apt update -y
    - name: Install Helm
      run: |
        curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
    - name: Lint Helm chart
      run: |
        helm lint deployment/helm/fastrg-controller
  helm-deployment:
    runs-on: ubuntu-latest
    needs: [build, test, docker-build, helm-lint]
    steps:
    - uses: actions/checkout@v7
    - name: Setup build environment
      uses: ./.github/actions/setup-build-env
    # The smoke suite's gRPC check go-runs tools/test_grpc, which imports the
    # gitignored generated controllerpb stubs — generate them first.
    - name: Generate code (protobuf + swagger)
      run: make build-backend
    - name: Download Docker image artifact
      uses: actions/download-artifact@v8
      with:
        name: docker-image
    - name: Load Docker image
      run: |
        docker load < fastrg-controller.tar.gz
        docker images
    - name: Set up kubectl
      uses: azure/setup-kubectl@v5
      with:
        version: 'latest'
    - name: Set up Helm
      run: |
        curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
    - name: Install kind and cilium cli
      run: |
        curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.30.0/kind-linux-amd64
        chmod +x ./kind
        sudo mv ./kind /usr/local/bin/kind
        curl -Lo ./cilium.tar.gz https://github.com/cilium/cilium-cli/releases/latest/download/cilium-linux-amd64.tar.gz
        tar -xzf cilium.tar.gz
        sudo mv cilium /usr/local/bin/cilium
    - name: Create kind cluster
      run: |
        # 55688 (Prometheus) is in the Linux ephemeral port range; reserve it so
        # outbound connections can't squat it before kind publishes the port.
        sudo sysctl -w net.ipv4.ip_local_reserved_ports=55688
        make k8s-create-test-env
    - name: Deploy service
      run: |
        make helm-install-ci
    - name: Wait for deployment to be ready
      run: |
        kubectl wait --for=condition=available --timeout=360s deployment/fastrg-controller -n fastrg-system || true
        sleep 30
    - name: Verify deployment
      run: |
        deployment/quickstart_k8s/deploy.sh --test-only || echo "⚠️ Service tests failed, but deployment completed"
        HOST_IP=$(ip route get 8.8.8.8 | awk '{print $7; exit}')
        export ETCD_ENDPOINTS="$HOST_IP:2378"
        echo "ETCD_ENDPOINTS is set to $ETCD_ENDPOINTS"
        tools/test_script.sh $HOST_IP run_feature_tests
  k8s-deployment:
    runs-on: ubuntu-latest
    needs: [build, test, docker-build]
    steps:
    - uses: actions/checkout@v7
    - name: Setup build environment
      uses: ./.github/actions/setup-build-env
    # The smoke suite's gRPC check go-runs tools/test_grpc, which imports the
    # gitignored generated controllerpb stubs — generate them first.
    - name: Generate code (protobuf + swagger)
      run: make build-backend
    - name: Download Docker image artifact
      uses: actions/download-artifact@v8
      with:
        name: docker-image
    - name: Load Docker image
      run: |
        docker load < fastrg-controller.tar.gz
        docker images
    - name: Set up kubectl
      uses: azure/setup-kubectl@v5
      with:
        version: 'latest'
    - name: Install kind and cilium cli
      run: |
        curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.30.0/kind-linux-amd64
        chmod +x ./kind
        sudo mv ./kind /usr/local/bin/kind
        curl -Lo ./cilium.tar.gz https://github.com/cilium/cilium-cli/releases/latest/download/cilium-linux-amd64.tar.gz
        tar -xzf cilium.tar.gz
        sudo mv cilium /usr/local/bin/cilium
    - name: Create kind cluster
      run: |
        # 55688 (Prometheus) is in the Linux ephemeral port range; reserve it so
        # outbound connections can't squat it before kind publishes the port.
        sudo sysctl -w net.ipv4.ip_local_reserved_ports=55688
        make k8s-create-test-env
    - name: Deploy service
      run: |
        make k8s-deploy
    - name: Wait for deployment to be ready
      run: |
        kubectl wait --for=condition=available --timeout=360s deployment/fastrg-controller -n fastrg-system || true
        sleep 30
    - name: Verify deployment
      run: |
        deployment/quickstart_k8s/deploy.sh --test-only || echo "⚠️ Service tests failed, but deployment completed"
        HOST_IP=$(ip route get 8.8.8.8 | awk '{print $7; exit}')
        export ETCD_ENDPOINTS="$HOST_IP:2378"
        echo "ETCD_ENDPOINTS is set to $ETCD_ENDPOINTS"
        tools/test_script.sh $HOST_IP run_feature_tests
