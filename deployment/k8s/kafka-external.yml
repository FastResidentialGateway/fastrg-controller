# External Kafka (runs OUTSIDE the cluster, alongside etcd/PostgreSQL on a
# dedicated host or a separate broker). The controller dials the stable
# in-cluster name `kafka-endpoint` (see KAFKA_BROKERS in controller.yml).
# Replace the IP below with your broker host. For a multi-broker cluster, list
# every broker IP under `addresses` and point KAFKA_BROKERS at this service.
apiVersion: v1
kind: Service
metadata:
  name: kafka-endpoint
  namespace: fastrg-system
  labels:
    app: kafka
spec:
  type: ClusterIP
  ports:
  - name: broker
    port: 9092
    targetPort: 9092
    protocol: TCP
---
apiVersion: v1
kind: Endpoints
metadata:
  name: kafka-endpoint
  namespace: fastrg-system
  labels:
    app: kafka
subsets:
- addresses:
  - ip: 192.168.10.215   # <-- external Kafka broker host
  ports:
  - name: broker
    port: 9092
    protocol: TCP
