# External access to the controller.
#
# Exposes only the controller's own ports. etcd (2379) and Kafka (9092) are
# external backends reached directly at their host, so they are NOT fronted by
# this LoadBalancer.
#
# Provider-agnostic: works with any LoadBalancer implementation (Cilium LB-IPAM,
# MetalLB, or a cloud provider). For Cilium LB-IPAM, also apply cilium-lb-pool.yml
# and (optionally) pin the VIP via the annotation below.
apiVersion: v1
kind: Service
metadata:
  name: fastrg-controller-loadbalancer
  namespace: fastrg-system
  labels:
    app: fastrg-controller
  annotations:
    # Cilium LB-IPAM: "auto" picks from the pool; replace with a fixed IP to pin.
    service.cilium.io/lb-ipam-ips: "auto"
spec:
  type: LoadBalancer
  # Preserve client source IP for node gRPC connections.
  externalTrafficPolicy: Local
  selector:
    app: fastrg-controller
  ports:
  - name: https
    port: 8443
    targetPort: 8443
    protocol: TCP
  - name: log-https
    port: 8444
    targetPort: 8444
    protocol: TCP
  - name: http
    port: 8080
    targetPort: 8080
    protocol: TCP
  - name: grpc
    port: 50051
    targetPort: 50051
    protocol: TCP
