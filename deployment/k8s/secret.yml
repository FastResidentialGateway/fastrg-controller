# Controller secrets: shared JWT signing key + database DSN.
#
# SECURITY:
#   - jwt-secret MUST be identical across all replicas, otherwise a token issued
#     by one pod is rejected by another (login appears to randomly fail).
#   - Replace BOTH placeholder values before deploying, and prefer NOT committing
#     real secrets to git.
#
# Instead of editing/committing this file you can create the Secret imperatively:
#   kubectl create secret generic fastrg-controller-secrets -n fastrg-system \
#     --from-literal=jwt-secret="$(openssl rand -base64 32)" \
#     --from-literal=database-url="postgres://USER:PASS@postgresql-endpoint:5432/fastrg?sslmode=disable"
apiVersion: v1
kind: Secret
metadata:
  name: fastrg-controller-secrets
  namespace: fastrg-system
  labels:
    app: fastrg-controller
type: Opaque
stringData:
  # Generate: openssl rand -base64 32
  jwt-secret: "CHANGE-ME-shared-jwt-secret"
  # Host stays postgresql-endpoint (the external IP lives in postgresql-external.yml);
  # change only the credentials / db name if yours differ.
  database-url: "postgres://fastrg:fastrg@postgresql-endpoint:5432/fastrg?sslmode=disable"
