apiVersion: v1
kind: Service
metadata:
  name: postgresql-endpoint
  namespace: default
  labels:
    app: postgresql
spec:
  type: ClusterIP
  ports:
  - name: postgres
    port: 5432
    targetPort: 5432
    protocol: TCP
---
apiVersion: v1
kind: Endpoints
metadata:
  name: postgresql-endpoint
  namespace: default
subsets:
- addresses:
  - ip: 192.168.10.12  # Replace with external PostgreSQL host IP
  ports:
  - port: 5432
    protocol: TCP
