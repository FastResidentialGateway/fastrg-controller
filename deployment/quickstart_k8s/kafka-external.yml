apiVersion: v1
kind: Service
metadata:
  name: kafka-endpoint
  namespace: default
  labels:
    app: kafka
spec:
  type: ClusterIP
  ports:
  - name: broker
    port: 9092
    targetPort: 9092
    protocol: TCP
---
apiVersion: v1
kind: Endpoints
metadata:
  name: kafka-endpoint
  namespace: default
subsets:
- addresses:
  - ip: 192.168.10.12  # Replace with external Kafka broker IP
  ports:
  - port: 9092
    protocol: TCP
