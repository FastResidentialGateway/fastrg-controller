{{- if not .Values.controller.secrets.existingSecret }}
# Chart-managed Secret holding the shared JWT signing key and (when a DB is
# configured) the database DSN. For production, prefer overriding these with
# --set / a values file kept out of git, or set controller.secrets.existingSecret
# to a pre-created Secret containing the same keys.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "fastrg-controller.secretName" . }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "fastrg-controller.labels" . | nindent 4 }}
type: Opaque
stringData:
  # MUST be identical across all replicas (tokens are rejected otherwise).
  jwt-secret: {{ required "controller.secrets.jwtSecret is required (generate: openssl rand -base64 32)" .Values.controller.secrets.jwtSecret | quote }}
  {{- if ne .Values.postgresql.type "none" }}
  database-url: {{ include "fastrg-controller.databaseUrl" . | quote }}
  {{- end }}
{{- end }}
