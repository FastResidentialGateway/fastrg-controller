{{/* ConfigMap is not used in the k8s deployment, using env vars directly */}}

apiVersion: v1
kind: Service
metadata:
  name: fastrg-controller-service
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "fastrg-controller.labels" . | nindent 4 }}
    app: fastrg-controller
spec:
  type: {{ .Values.controller.service.type }}
  ports:
    - name: https
      port: {{ .Values.controller.service.httpsPort }}
      targetPort: {{ .Values.controller.service.httpsPort }}
      protocol: TCP
    - name: log-https
      port: {{ .Values.controller.service.logHttpsPort }}
      targetPort: {{ .Values.controller.service.logHttpsPort }}
      protocol: TCP
    - name: http
      port: {{ .Values.controller.service.httpPort }}
      targetPort: {{ .Values.controller.service.httpPort }}
      protocol: TCP
    - name: grpc
      port: {{ .Values.controller.service.grpcPort }}
      targetPort: {{ .Values.controller.service.grpcPort }}
      protocol: TCP
    - name: prometheus
      port: {{ .Values.controller.service.prometheusPort }}
      targetPort: {{ .Values.controller.service.prometheusPort }}
      protocol: TCP
  selector:
    app: fastrg-controller

---
{{- if .Values.controller.loadBalancer.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: fastrg-controller-loadbalancer
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "fastrg-controller.labels" . | nindent 4 }}
    app: fastrg-controller
  {{- if .Values.controller.loadBalancer.annotations }}
  annotations:
    {{- toYaml .Values.controller.loadBalancer.annotations | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.controller.loadBalancer.type }}
  ports:
    - name: https
      port: {{ .Values.controller.service.httpsPort }}
      targetPort: {{ .Values.controller.service.httpsPort }}
      protocol: TCP
    - name: log-https
      port: {{ .Values.controller.service.logHttpsPort }}
      targetPort: {{ .Values.controller.service.logHttpsPort }}
      protocol: TCP
    - name: http
      port: {{ .Values.controller.service.httpPort }}
      targetPort: {{ .Values.controller.service.httpPort }}
      protocol: TCP
    - name: grpc
      port: {{ .Values.controller.service.grpcPort }}
      targetPort: {{ .Values.controller.service.grpcPort }}
      protocol: TCP
    - name: prometheus
      port: {{ .Values.controller.service.prometheusPort }}
      targetPort: {{ .Values.controller.service.prometheusPort }}
      protocol: TCP
  selector:
    app: fastrg-controller
{{- end }}

---
{{- if .Values.controller.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: fastrg-controller-logs
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: {{ include "fastrg-controller.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.controller.persistence.size }}
  {{- if .Values.controller.persistence.storageClass }}
  storageClassName: {{ .Values.controller.persistence.storageClass }}
  {{- else if .Values.global.storageClass }}
  storageClassName: {{ .Values.global.storageClass }}
  {{- end }}
{{- end }}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastrg-controller
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "fastrg-controller.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.controller.replicaCount }}
  selector:
    matchLabels:
      app: fastrg-controller
  template:
    metadata:
      labels:
        app: fastrg-controller
    spec:
      serviceAccountName: {{ include "fastrg-controller.serviceAccountName" . }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- else }}
      affinity:
        # Soft anti-affinity: prefer spreading the replicas across nodes, but
        # still schedule on clusters with fewer nodes than replicas.
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              topologyKey: kubernetes.io/hostname
              labelSelector:
                matchLabels:
                  app: fastrg-controller
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: fastrg-controller
        image: "{{ .Values.controller.image.repository }}:{{ .Values.controller.image.tag }}"
        imagePullPolicy: {{ .Values.controller.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.controller.service.httpsPort }}
          {{- if .Values.controller.service.hostPortEnabled }}
          hostPort: {{ .Values.controller.service.httpsPort }}
          {{- end }}
          name: https
        - containerPort: {{ .Values.controller.service.logHttpsPort }}
          {{- if .Values.controller.service.hostPortEnabled }}
          hostPort: {{ .Values.controller.service.logHttpsPort }}
          {{- end }}
          name: log-https
        - containerPort: {{ .Values.controller.service.httpPort }}
          {{- if .Values.controller.service.hostPortEnabled }}
          hostPort: {{ .Values.controller.service.httpPort }}
          {{- end }}
          name: http
        - containerPort: {{ .Values.controller.service.grpcPort }}
          {{- if .Values.controller.service.hostPortEnabled }}
          hostPort: {{ .Values.controller.service.grpcPort }}
          {{- end }}
          name: grpc
          protocol: TCP
        - containerPort: {{ .Values.controller.service.prometheusPort }}
          {{- if .Values.controller.service.hostPortEnabled }}
          hostPort: {{ .Values.controller.service.prometheusPort }}
          {{- end }}
          name: prometheus
          protocol: TCP
        env:
        # Leader-election identity (etcd-based election). Only the leader runs
        # the singleton background workers (projection / stale eviction /
        # per-node scraping); all replicas serve REST/gRPC + the Kafka consumer.
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        # Shared JWT signing key from a Secret (same across all replicas).
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ include "fastrg-controller.secretName" . }}
              key: jwt-secret
        - name: ETCD_ENDPOINTS
          value: {{- if eq .Values.etcd.type "internal" }} "etcd-endpoint:2379" {{- else }} "{{- range $index, $endpoint := .Values.etcd.external.endpoints }}{{- if $index }},{{- end }}{{ $endpoint.ip }}:{{ $endpoint.port }}{{- end }}" {{- end }}
        - name: CERT_FILE
          value: {{ .Values.controller.tls.certFile | quote }}
        - name: KEY_FILE
          value: {{ .Values.controller.tls.keyFile | quote }}
        - name: PROMETHEUS_LISTEN_IP
          value: {{ .Values.controller.config.prometheusListenIP | quote }}
        {{- if ne .Values.postgresql.type "none" }}
        # Database DSN from the Secret (credentials kept out of the pod spec).
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: {{ include "fastrg-controller.secretName" . }}
              key: database-url
        {{- end }}
        {{- if eq .Values.kafka.type "internal" }}
        - name: KAFKA_BROKERS
          value: "kafka-endpoint:{{ .Values.kafka.internal.service.port }}"
        - name: KAFKA_TOPIC
          value: {{ .Values.kafka.topic | quote }}
        - name: KAFKA_GROUP
          value: {{ .Values.kafka.group | quote }}
        {{- else if and (eq .Values.kafka.type "external") .Values.kafka.external.brokers }}
        - name: KAFKA_BROKERS
          value: {{ .Values.kafka.external.brokers | quote }}
        - name: KAFKA_TOPIC
          value: {{ .Values.kafka.topic | quote }}
        - name: KAFKA_GROUP
          value: {{ .Values.kafka.group | quote }}
        {{- end }}
        readinessProbe:
          {{- toYaml .Values.controller.readinessProbe | nindent 10 }}
        livenessProbe:
          {{- toYaml .Values.controller.livenessProbe | nindent 10 }}
        {{- if .Values.controller.resources }}
        resources:
          {{- toYaml .Values.controller.resources | nindent 10 }}
        {{- end }}
